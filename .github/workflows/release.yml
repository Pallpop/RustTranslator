name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.0)'
        required: true
        type: string
      run_id:
        description: 'Build workflow 的 Run ID'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts from build run
        uses: actions/download-artifact@v8
        with:
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          files: |
            RustTranslator-macos-*/**/*.dmg
            RustTranslator-macos-*/**/*.app
            RustTranslator-windows-*/**/*.msi
            RustTranslator-windows-*/**/*.exe
          draft: true
