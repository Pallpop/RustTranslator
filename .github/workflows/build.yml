name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.0)'
        required: true
        type: string

jobs:
  tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$(gh api repos/${{ github.repository }}/git/ref/tags/v${{ inputs.version }} 2>/dev/null)" ]; then
            echo "Tag v${{ inputs.version }} already exists, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag v${{ inputs.version }}
            gh api repos/${{ github.repository }}/git/refs -f -X POST \
              -f ref="refs/tags/v${{ inputs.version }}" \
              -f sha="$(git rev-parse v${{ inputs.version }})"
          fi

  build:
    needs: [tag]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macos
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }} ${{ matrix.target }})

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: RustTranslator-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: RustTranslator-${{ matrix.platform }}-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/download-artifact@v8

      - name: Determine version
        id: version
        run: |
          echo "tag=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          echo "name=v${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: |
            RustTranslator-macos-*/**/*.dmg
            RustTranslator-macos-*/**/*.app
            RustTranslator-windows-*/**/*.msi
            RustTranslator-windows-*/**/*.exe
          draft: true
